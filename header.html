<!DOCTYPE html>
<!-- header.html — shared navigation for Click Genius -->
<!-- Include this file via: <script>loadComponent('header.html', 'header-placeholder')</script> -->

<nav id="site-header"
    class="fixed top-0 w-full bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm dark:shadow-none z-50 transition-all duration-300">
    <div
        class="flex justify-between items-center h-20 px-margin-mobile md:px-margin-desktop max-w-[1200px] mx-auto w-full">

        <!-- Logo -->
        <a href="index.html" class="flex items-center gap-base">
            <img alt="Click Genius Logo" class="h-10 w-auto"
                src="logo.png"
                onerror="this.style.display='none'">
            <span class="text-headline-md font-headline-md font-extrabold text-primary dark:text-primary-fixed">
                Click Genius
            </span>
        </a>

        <!-- Desktop Nav Links -->
        <div class="hidden md:flex items-center gap-lg" id="nav-links">
            <a class="nav-link font-label-md text-label-md transition-all duration-200"
                href="index.html" data-page="index">Home</a>
            <a class="nav-link font-label-md text-label-md transition-all duration-200"
                href="services.html" data-page="services">Services</a>
            <a class="nav-link font-label-md text-label-md transition-all duration-200"
                href="portfolio.html" data-page="portfolio">Portfolio</a>
            <a class="nav-link font-label-md text-label-md transition-all duration-200"
                href="contac.html" data-page="contac">Contact</a>
        </div>

        <!-- CTA Button -->
        <a href="https://clickgenius8jwp.setmore.com/services/05558919-5c44-46f3-b9a1-e459499b66a8" target="_blank">
            <button
                class="bg-secondary text-on-secondary px-md py-sm rounded-lg font-label-md text-label-md hover:opacity-80 transition-all active:scale-95">
                Get Started
            </button>
        </a>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn"
            class="md:hidden flex items-center justify-center w-10 h-10 rounded-lg text-on-surface hover:bg-surface-container transition-colors"
            aria-label="Toggle mobile menu">
            <span class="material-symbols-outlined" id="menu-icon">menu</span>
        </button>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div id="mobile-menu"
        class="md:hidden hidden bg-surface border-t border-outline-variant px-margin-mobile py-md space-y-sm shadow-md">
        <a class="mobile-nav-link block font-label-md text-label-md py-sm px-md rounded-lg transition-all"
            href="index.html" data-page="index">Home</a>
        <a class="mobile-nav-link block font-label-md text-label-md py-sm px-md rounded-lg transition-all"
            href="services.html" data-page="services">Services</a>
        <a class="mobile-nav-link block font-label-md text-label-md py-sm px-md rounded-lg transition-all"
            href="portfolio.html" data-page="portfolio">Portfolio</a>
        <a class="mobile-nav-link block font-label-md text-label-md py-sm px-md rounded-lg transition-all"
            href="contac.html" data-page="contac">Contact</a>
        <div class="pt-sm border-t border-outline-variant">
            <a href="https://clickgenius8jwp.setmore.com/services/05558919-5c44-46f3-b9a1-e459499b66a8" target="_blank"
                class="block">
                <button
                    class="w-full bg-secondary text-on-secondary py-sm rounded-lg font-label-md text-label-md hover:opacity-80 transition-all active:scale-95">
                    Get Started
                </button>
            </a>
        </div>
    </div>
</nav>

<script>
    (function () {
        // Highlight active nav link based on current page filename
        const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'index';

        document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(link => {
            const page = link.getAttribute('data-page');
            if (page === currentPage) {
                link.classList.add('text-secondary', 'font-bold', 'border-b-2', 'border-secondary', 'pb-1');
                link.classList.remove('text-on-surface-variant', 'hover:text-secondary');
            } else {
                link.classList.add('text-on-surface-variant', 'hover:text-secondary');
            }
        });

        // Mobile menu toggle
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        mobileBtn.addEventListener('click', () => {
            const isOpen = !mobileMenu.classList.contains('hidden');
            mobileMenu.classList.toggle('hidden', isOpen);
            menuIcon.textContent = isOpen ? 'menu' : 'close';
        });

        // Scroll glass effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('site-header');
            if (window.scrollY > 50) {
                nav.style.background = 'rgba(250, 248, 255, 0.85)';
                nav.style.backdropFilter = 'blur(12px)';
                nav.style.webkitBackdropFilter = 'blur(12px)';
                nav.classList.add('shadow-md');
            } else {
                nav.style.background = '';
                nav.style.backdropFilter = '';
                nav.style.webkitBackdropFilter = '';
                nav.classList.remove('shadow-md');
            }
        });
    })();
</script>
