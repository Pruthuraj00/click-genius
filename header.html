<script>
    (function () {
        // Highlight active nav link based on current page filename
        const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'index';

        document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(link => {
            const page = link.getAttribute('data-page');
            if (page === currentPage) {
                link.classList.add('text-secondary', 'font-bold', 'border-b-2', 'border-secondary', 'pb-1');
                link.classList.remove('text-on-surface-variant', 'hover:text-secondary');
            } else {
                link.classList.add('text-on-surface-variant', 'hover:text-secondary');
            }
        });

        // Mobile menu toggle
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        mobileBtn.addEventListener('click', () => {
            const isOpen = !mobileMenu.classList.contains('hidden');
            mobileMenu.classList.toggle('hidden', isOpen);
            menuIcon.textContent = isOpen ? 'menu' : 'close';
        });

        // Scroll glass effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('site-header');
            if (window.scrollY > 50) {
                nav.style.background = 'rgba(250, 248, 255, 0.85)';
                nav.style.backdropFilter = 'blur(12px)';
                nav.style.webkitBackdropFilter = 'blur(12px)';
                nav.classList.add('shadow-md');
            } else {
                nav.style.background = '';
                nav.style.backdropFilter = '';
                nav.style.webkitBackdropFilter = '';
                nav.classList.remove('shadow-md');
            }
        });
    })();
</script>
